<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhatsApp Monitor</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #25D366; --green-dark: #128C7E; --green-light: #DCF8C6;
      --bg: #ECE5DD; --white: #ffffff; --gray: #667781; --text: #111B21;
      --red: #EA4335; --blue: #1A73E8; --yellow: #F9AB00;
      --shadow: 0 1px 3px rgba(0,0,0,0.12);
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
    header { background: var(--green-dark); color: white; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 6px rgba(0,0,0,0.3); flex-shrink: 0; }
    header h1 { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
    header h1 svg { width: 24px; height: 24px; fill: white; }
    #status-badge { display: flex; align-items: center; gap: 8px; font-size: 13px; background: rgba(255,255,255,0.15); padding: 6px 12px; border-radius: 20px; }
    #status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ff6b6b; transition: background 0.3s; }
    #status-dot.online { background: #51e06e; }
    #qr-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
    #qr-modal.show { display: flex; }
    #qr-box { background: white; border-radius: 16px; padding: 32px; text-align: center; max-width: 360px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
    #qr-box h2 { color: var(--green-dark); margin-bottom: 8px; font-size: 20px; }
    #qr-box p { color: var(--gray); font-size: 13px; margin-bottom: 20px; line-height: 1.5; }
    #qr-img { width: 220px; height: 220px; border: 2px solid #eee; border-radius: 8px; }
    nav { background: white; display: flex; border-bottom: 1px solid #ddd; flex-shrink: 0; overflow-x: auto; }
    .tab { padding: 12px 20px; font-size: 13px; font-weight: 600; color: var(--gray); cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
    .tab:hover { color: var(--green-dark); }
    .tab.active { color: var(--green-dark); border-bottom-color: var(--green-dark); }
    .badge { background: var(--green); color: white; border-radius: 10px; padding: 1px 7px; font-size: 11px; font-weight: 700; min-width: 18px; text-align: center; }
    .badge.red { background: var(--red); }
    .badge.blue { background: var(--blue); }
    .badge.yellow { background: var(--yellow); color: #111; }
    main { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--gray); gap: 12px; padding: 40px; text-align: center; }
    .empty svg { width: 48px; height: 48px; opacity: 0.3; }
    .msg-card { background: white; border-radius: 10px; padding: 14px 16px; box-shadow: var(--shadow); border-left: 4px solid var(--green); animation: slideIn 0.3s ease; position: relative; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    .msg-card.direct { border-left-color: var(--blue); }
    .msg-card.mention { border-left-color: var(--red); }
    .msg-card.eximio { border-left-color: var(--green); }
    .msg-card.pendente { border-left-color: var(--yellow); }
    .msg-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .msg-sender { font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 6px; }
    .msg-group { font-size: 12px; color: var(--gray); margin-bottom: 4px; }
    .msg-time { font-size: 11px; color: var(--gray); }
    .msg-body { font-size: 14px; line-height: 1.5; color: var(--text); word-break: break-word; }
    .msg-tag { display: inline-block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 7px; border-radius: 4px; margin-right: 4px; }
    .tag-direct { background: #E8F0FE; color: var(--blue); }
    .tag-mention { background: #FCE8E6; color: var(--red); }
    .tag-eximio { background: var(--green-light); color: var(--green-dark); }
    .tag-pendente { background: #FEF3C7; color: #B45309; }
    .new-dot { position: absolute; top: 12px; right: 12px; width: 8px; height: 8px; background: var(--red); border-radius: 50%; }
    #sound-btn { background: rgba(255,255,255,0.15); border: none; color: white; padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 16px; }
    #sound-btn:hover { background: rgba(255,255,255,0.25); }
  </style>
</head>
<body>
<div id="qr-modal">
  <div id="qr-box">
    <h2>Connect WhatsApp</h2>
    <p>Open WhatsApp on your phone &rarr; Menu &rarr; Linked devices &rarr; Link a device</p>
    <img id="qr-img" src="" alt="QR Code" />
  </div>
</div>
<header>
  <h1>
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 0C5.373 0 0 5.373 0 12c0 2.122.554 4.116 1.523 5.847L.054 23.5l5.805-1.521A11.94 11.94 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm6.32 17.116c-.267.75-1.334 1.375-2.177 1.558-.58.123-1.337.22-3.882-.834-3.262-1.34-5.368-4.646-5.529-4.86-.153-.214-1.29-1.718-1.29-3.276 0-1.558.815-2.323 1.103-2.638.267-.29.582-.363.776-.363.194 0 .388.002.558.01.18.008.42-.068.656.502.248.594.843 2.057.916 2.207.073.15.122.327.024.532-.099.205-.148.33-.293.508-.145.178-.305.397-.436.533-.145.15-.296.313-.127.615.169.302.748 1.233 1.606 1.997 1.104.986 2.034 1.29 2.33 1.435.297.145.47.12.642-.073.17-.194.733-.854.93-1.147.194-.293.39-.242.656-.145.267.097 1.7.8 1.99.946.29.145.484.218.556.34.073.122.073.708-.194 1.457z"/>
    </svg>
    WhatsApp Monitor
  </h1>
  <div style="display:flex;align-items:center;gap:10px;">
    <button id="sound-btn" title="Toggle sound">&#128276;</button>
    <div id="status-badge">
      <div id="status-dot"></div>
      <span id="status-text">Connecting...</span>
    </div>
  </div>
</header>
<nav>
  <div class="tab active" data-tab="all">All <span class="badge" id="badge-all">0</span></div>
  <div class="tab" data-tab="direct">&#128172; Direct <span class="badge blue" id="badge-direct">0</span></div>
  <div class="tab" data-tab="mention">&#128276; @Mentions <span class="badge red" id="badge-mention">0</span></div>
  <div class="tab" data-tab="eximio">&#11088; Eximio <span class="badge" id="badge-eximio">0</span></div>
  <div class="tab" data-tab="pendente">&#9203; Pending <span class="badge yellow" id="badge-pendente">0</span></div>
</nav>
<main id="feed">
  <div class="empty" id="empty-state">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <p>Waiting for messages...</p>
    <p style="font-size:12px;">Direct messages, @mentions and Eximio/Pending labels will appear here.</p>
  </div>
</main>
<script>
  const socket = io();
  let currentTab = 'all';
  let soundEnabled = true;
  const counts = { all: 0, direct: 0, mention: 0, eximio: 0, pendente: 0 };
  const allMessages = [];

  function playNotif() {
    if (!soundEnabled) return;
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880; osc.type = 'sine';
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.4);
    } catch(e) {}
  }

  document.getElementById('sound-btn').addEventListener('click', () => {
    soundEnabled = !soundEnabled;
    document.getElementById('sound-btn').innerHTML = soundEnabled ? '&#128276;' : '&#128277;';
  });

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentTab = tab.dataset.tab;
      renderFeed();
    });
  });

  function formatTime(iso) {
    const d = new Date(iso);
    return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  }
  function formatDate(iso) {
    const d = new Date(iso), today = new Date();
    if (d.toDateString() === today.toDateString()) return 'Today';
    const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
    if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
    return d.toLocaleDateString('en-US');
  }
  function tagLabel(cat) {
    return { direct: 'Direct', mention: '@Mention', eximio: 'Eximio', pendente: 'Pending' }[cat] || cat;
  }
  function escHtml(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function createCard(msg, isNew) {
    const card = document.createElement('div');
    card.className = `msg-card ${msg.category}`;
    const timeStr = `${formatDate(msg.timestamp)} ${formatTime(msg.timestamp)}`;
    card.innerHTML = `
      ${isNew ? '<div class="new-dot"></div>' : ''}
      <div class="msg-header">
        <div class="msg-sender"><span class="msg-tag tag-${msg.category}">${tagLabel(msg.category)}</span>${escHtml(msg.sender)}</div>
        <span class="msg-time">${timeStr}</span>
      </div>
      <div class="msg-group">${msg.category !== 'direct' ? '&#128101; ' + escHtml(msg.chatName) : '&#128172; Direct message'}</div>
      <div class="msg-body">${msg.hasMedia ? '&#128206; ' : ''}${escHtml(msg.body || '[media]')}</div>`;
    return card;
  }
  function renderFeed() {
    const feed = document.getElementById('feed'), empty = document.getElementById('empty-state');
    const msgs = currentTab === 'all' ? allMessages : allMessages.filter(m => m.category === currentTab);
    Array.from(feed.children).forEach(c => { if (c !== empty) c.remove(); });
    if (!msgs.length) { empty.style.display = 'flex'; return; }
    empty.style.display = 'none';
    msgs.forEach(msg => feed.appendChild(createCard(msg, false)));
  }
  function updateBadge(cat) {
    counts[cat] = (counts[cat] || 0) + 1; counts.all++;
    const el = document.getElementById(`badge-${cat}`);
    if (el) el.textContent = counts[cat];
    document.getElementById('badge-all').textContent = counts.all;
  }
  socket.on('status', data => {
    document.getElementById('status-dot').className = 'status-dot' + (data.connected ? ' online' : '');
    document.getElementById('status-text').textContent = data.message;
    if (data.connected) document.getElementById('qr-modal').classList.remove('show');
  });
  socket.on('qr', url => {
    document.getElementById('qr-img').src = url;
    document.getElementById('qr-modal').classList.add('show');
  });
  socket.on('history', msgs => {
    msgs.forEach(m => allMessages.push(m));
    Object.keys(counts).forEach(k => counts[k] = 0);
    allMessages.forEach(m => { counts[m.category] = (counts[m.category]||0)+1; counts.all++; });
    Object.keys(counts).forEach(k => { const el = document.getElementById(`badge-${k}`); if(el) el.textContent = counts[k]; });
    renderFeed();
  });
  socket.on('message', msg => {
    allMessages.unshift(msg); updateBadge(msg.category); playNotif();
    if (Notification.permission === 'granted') new Notification(`WhatsApp — ${msg.sender}`, { body: msg.body || '[media]' });
    if (currentTab === 'all' || currentTab === msg.category) {
      const feed = document.getElementById('feed');
      document.getElementById('empty-state').style.display = 'none';
      const card = createCard(msg, true);
      feed.insertBefore(card, feed.firstChild);
      setTimeout(() => { const d = card.querySelector('.new-dot'); if(d) d.remove(); }, 3000);
    }
  });
  if (Notification.permission === 'default') Notification.requestPermission();
</script>
</body>
</html>
