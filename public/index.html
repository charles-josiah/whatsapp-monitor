<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhatsApp Monitor</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #25D366; --green-dark: #128C7E; --green-light: #DCF8C6;
      --bg: #ECE5DD; --white: #fff; --gray: #667781; --text: #111B21;
      --red: #EA4335; --blue: #1A73E8; --yellow: #F9AB00;
      --orange: #E8710A; --shadow: 0 1px 3px rgba(0,0,0,0.12);
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

    header { background: var(--green-dark); color: white; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 6px rgba(0,0,0,0.3); flex-shrink: 0; gap: 10px; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    header h1 { font-size: 17px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    header h1 svg { width: 22px; height: 22px; fill: white; flex-shrink: 0; }
    #app-version { font-size: 10px; font-weight: 400; opacity: 0.65; margin-left: 2px; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    #status-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; background: rgba(255,255,255,0.15); padding: 5px 10px; border-radius: 20px; }
    #status-dot { width: 7px; height: 7px; border-radius: 50%; background: #ff6b6b; transition: background 0.3s; flex-shrink: 0; }
    #status-dot.online { background: #51e06e; }
    #unread-badge { display: none; align-items: center; gap: 5px; background: rgba(255,255,255,0.15); padding: 5px 10px; border-radius: 20px; font-size: 12px; }
    #unread-badge.visible { display: flex; }
    #unread-count { background: var(--red); color: white; border-radius: 10px; padding: 1px 6px; font-size: 11px; font-weight: 700; }
    #clear-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 5px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; white-space: nowrap; }
    #clear-btn:hover { background: rgba(255,255,255,0.3); }
    #clear-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #sound-btn { background: rgba(255,255,255,0.15); border: none; color: white; padding: 5px 9px; border-radius: 8px; cursor: pointer; font-size: 15px; }

    #qr-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
    #qr-modal.show { display: flex; }
    #qr-box { background: white; border-radius: 16px; padding: 28px; text-align: center; max-width: 340px; width: 90%; }
    #qr-box h2 { color: var(--green-dark); margin-bottom: 8px; }
    #qr-box p { color: var(--gray); font-size: 12px; margin-bottom: 16px; line-height: 1.5; }
    #qr-img { width: 200px; height: 200px; border: 2px solid #eee; border-radius: 8px; }

    nav { background: white; display: flex; border-bottom: 1px solid #ddd; flex-shrink: 0; overflow-x: auto; }
    .tab { padding: 11px 16px; font-size: 12px; font-weight: 600; color: var(--gray); cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; transition: all 0.2s; display: flex; align-items: center; gap: 5px; }
    .tab:hover { color: var(--green-dark); }
    .tab.active { color: var(--green-dark); border-bottom-color: var(--green-dark); }
    .tab-badge { background: var(--green); color: white; border-radius: 10px; padding: 1px 6px; font-size: 10px; font-weight: 700; min-width: 16px; text-align: center; }
    .tab-badge.red { background: var(--red); }
    .tab-badge.blue { background: var(--blue); }
    .tab-badge.yellow { background: var(--yellow); color: #111; }
    .tab-badge.gray { background: var(--gray); }

    main { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
    .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--gray); gap: 10px; padding: 40px; text-align: center; }
    .empty svg { width: 44px; height: 44px; opacity: 0.3; }

    /* Thread card */
    .thread-card { background: white; border-radius: 10px; box-shadow: var(--shadow); border-left: 4px solid var(--green); animation: slideIn 0.25s ease; overflow: hidden; }
    .thread-card.followed { border-left-color: var(--orange) !important; }
    .thread-card.is-read { opacity: 0.65; border-left-color: #ccc !important; }
    .thread-card.direct { border-left-color: var(--blue); }
    .thread-card.mention { border-left-color: var(--red); }
    .thread-card.eximio { border-left-color: var(--green); }
    .thread-card.pendente { border-left-color: var(--yellow); }
    @keyframes slideIn { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:translateY(0); } }

    /* Thread header */
    .thread-header { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px; gap: 8px; cursor: pointer; user-select: none; }
    .thread-header:hover { background: #f7f7f7; }
    .th-left { display: flex; align-items: center; gap: 7px; min-width: 0; flex: 1; }
    .msg-tag { display: inline-block; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; padding: 2px 5px; border-radius: 4px; flex-shrink: 0; }
    .tag-direct { background: #E8F0FE; color: var(--blue); }
    .tag-mention { background: #FCE8E6; color: var(--red); }
    .tag-eximio { background: var(--green-light); color: var(--green-dark); }
    .tag-pendente { background: #FEF3C7; color: #B45309; }
    .tag-followed { background: #FEE8D6; color: var(--orange); }
    .thread-name { font-weight: 700; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .thread-preview { font-size: 11px; color: var(--gray); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
    .th-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .msg-count { font-size: 11px; color: var(--gray); white-space: nowrap; }
    .new-pill { background: var(--red); color: white; border-radius: 10px; padding: 1px 7px; font-size: 10px; font-weight: 700; }
    .action-check { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--gray); cursor: pointer; user-select: none; }
    .action-check input { width: 13px; height: 13px; cursor: pointer; accent-color: var(--green-dark); }
    .action-check.follow-check { color: var(--orange); font-weight: 600; }
    .action-check.follow-check input { accent-color: var(--orange); }
    .chevron { font-size: 10px; color: var(--gray); transition: transform 0.2s; flex-shrink: 0; }
    .chevron.open { transform: rotate(90deg); }

    /* Thread body */
    .thread-body { display: none; border-top: 1px solid #f0f0f0; }
    .thread-body.open { display: block; }

    /* Message rows — received (left) */
    .thread-msgs { padding: 4px 0; }
    .thread-msg { display: flex; padding: 4px 12px; }
    .tree-line { display: flex; flex-direction: column; align-items: center; margin-right: 9px; flex-shrink: 0; padding-top: 4px; }
    .tree-dot { width: 6px; height: 6px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
    .tree-dot.new { background: var(--green); }
    .tree-vline { width: 1px; background: #e5e5e5; flex: 1; margin-top: 3px; min-height: 8px; }
    .thread-msg:last-child .tree-vline { display: none; }
    .msg-content { flex: 1; min-width: 0; }
    .msg-row-top { display: flex; align-items: baseline; gap: 6px; margin-bottom: 1px; }
    .msg-sender-sm { font-size: 11px; font-weight: 700; color: var(--green-dark); }
    .msg-time-sm { font-size: 10px; color: var(--gray); }
    .msg-body-sm { font-size: 12px; color: var(--text); line-height: 1.4; word-break: break-word; }

    /* Sent messages (right) */
    .thread-msg.sent { justify-content: flex-end; }
    .sent-bubble {
      background: var(--green-light);
      border-radius: 8px 0px 8px 8px;
      padding: 5px 10px;
      max-width: 78%;
      text-align: right;
    }
    .sent-bubble .msg-body-sm { color: #1a3c2e; }
    .sent-bubble .msg-row-top { justify-content: flex-end; }
    .sent-bubble .msg-sender-sm { color: var(--green-dark); }

    /* Reply area */
    .thread-reply { display: flex; gap: 8px; padding: 7px 12px; border-top: 1px solid #f0f0f0; }
    .reply-input { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 5px 12px; font-size: 12px; outline: none; transition: border 0.2s; }
    .reply-input:focus { border-color: var(--green-dark); }
    .reply-btn { background: var(--green-dark); color: white; border: none; border-radius: 20px; padding: 5px 14px; font-size: 12px; cursor: pointer; font-weight: 600; white-space: nowrap; }
    .reply-btn:hover { background: var(--green); }
    .reply-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 8px 18px; border-radius: 20px; font-size: 13px; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>
<div id="qr-modal"><div id="qr-box"><h2>Connect WhatsApp</h2><p>Open WhatsApp &rarr; Linked devices &rarr; Link a device</p><img id="qr-img" src="" alt="QR" /></div></div>
<div id="toast"></div>

<header>
  <div class="header-left">
    <h1>
      <svg viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12c0 2.122.554 4.116 1.523 5.847L.054 23.5l5.805-1.521A11.94 11.94 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm6.32 17.116c-.267.75-1.334 1.375-2.177 1.558-.58.123-1.337.22-3.882-.834-3.262-1.34-5.368-4.646-5.529-4.86-.153-.214-1.29-1.718-1.29-3.276 0-1.558.815-2.323 1.103-2.638.267-.29.582-.363.776-.363.194 0 .388.002.558.01.18.008.42-.068.656.502.248.594.843 2.057.916 2.207.073.15.122.327.024.532-.099.205-.148.33-.293.508-.145.178-.305.397-.436.533-.145.15-.296.313-.127.615.169.302.748 1.233 1.606 1.997 1.104.986 2.034 1.29 2.33 1.435.297.145.47.12.642-.073.17-.194.733-.854.93-1.147.194-.293.39-.242.656-.145.267.097 1.7.8 1.99.946.29.145.484.218.556.34.073.122.073.708-.194 1.457z"/></svg>
      WhatsApp Monitor
      <span id="app-version">v0.1.dev</span>
    </h1>
  </div>
  <div class="header-right">
    <div id="unread-badge">&#128172; Unread groups: <span id="unread-count">0</span></div>
    <button id="clear-btn">&#129529; Clear All</button>
    <button id="sound-btn">&#128276;</button>
    <div id="status-badge"><div id="status-dot"></div><span id="status-text">Connecting...</span></div>
  </div>
</header>

<nav>
  <div class="tab active" data-tab="all">All <span class="tab-badge" id="badge-all">0</span></div>
  <div class="tab" data-tab="direct">&#128172; Direct <span class="tab-badge blue" id="badge-direct">0</span></div>
  <div class="tab" data-tab="mention">&#128276; @Mentions <span class="tab-badge red" id="badge-mention">0</span></div>
  <div class="tab" data-tab="eximio">&#11088; Eximio <span class="tab-badge" id="badge-eximio">0</span></div>
  <div class="tab" data-tab="pendente">&#9203; Pending <span class="tab-badge yellow" id="badge-pendente">0</span></div>
  <div class="tab" data-tab="followed">&#128992; Following <span class="tab-badge" id="badge-followed" style="background:var(--orange)">0</span></div>
  <div class="tab" data-tab="read">&#9989; Read <span class="tab-badge gray" id="badge-read">0</span></div>
</nav>

<main id="feed">
  <div class="empty" id="empty-state">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <p>Waiting for messages...</p>
  </div>
</main>

<script>
  const socket = io();
  let currentTab = 'all', soundEnabled = true;
  const threads = new Map();
  const threadOrder = [];
  const counts = { all:0, direct:0, mention:0, eximio:0, pendente:0, followed:0, read:0 };
  const expandedChats = new Set();

  fetch('/api/version').then(r=>r.json()).then(d=>{
    document.getElementById('app-version').textContent='v'+d.version;
  }).catch(()=>{});

  // ─ helpers
  function playNotif(){
    if(!soundEnabled)return;
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=880;o.type='sine';
      g.gain.setValueAtTime(0.3,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);
      o.start();o.stop(ctx.currentTime+0.4);
    }catch(e){}
  }
  document.getElementById('sound-btn').addEventListener('click',()=>{
    soundEnabled=!soundEnabled;
    document.getElementById('sound-btn').innerHTML=soundEnabled?'&#128276;':'&#128277;';
  });
  function toast(msg,d=2500){
    const el=document.getElementById('toast');
    el.textContent=msg;el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'),d);
  }
  function fmtTime(iso){return new Date(iso).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});}
  function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function tagLabel(c){
    if(c==='followed') return 'Following';
    return{direct:'Direct',mention:'@Mention',eximio:'Eximio',pendente:'Pending'}[c]||c;
  }

  document.querySelectorAll('.tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');currentTab=tab.dataset.tab;renderFeed();
    });
  });

  // ─ thread model
  function addMsg(msg, isNew){
    let t=threads.get(msg.chatId);
    if(!t){
      t={chatId:msg.chatId,chatName:msg.chatName,category:msg.category,
         labels:msg.labels,followed:false,markedRead:false,messages:[],newCount:0};
      threads.set(msg.chatId,t);
      threadOrder.unshift(msg.chatId);
    } else if(isNew){
      const idx=threadOrder.indexOf(msg.chatId);
      if(idx>0){threadOrder.splice(idx,1);threadOrder.unshift(msg.chatId);}
      // new message on read thread → unread it
      if(t.markedRead && !msg.fromMe){
        t.markedRead=false;
        counts.read=Math.max(0,counts.read-1);
        if(!t.followed){ counts[t.category]=(counts[t.category]||0)+1; counts.all++; }
        updateBadges();
      }
    }
    t.messages.push(msg);
    if(isNew&&!msg.read&&!msg.fromMe) t.newCount=(t.newCount||0)+1;
    return t;
  }

  // Mark read → move to Read tab
  function doMarkReadThread(chatId){
    const t=threads.get(chatId);if(!t||t.markedRead)return;
    t.markedRead=true;t.newCount=0;
    t.messages.forEach(m=>m.read=true);
    if(!t.followed){
      counts[t.category]=Math.max(0,(counts[t.category]||0)-1);
      counts.all=Math.max(0,counts.all-1);
    } else {
      counts.followed=Math.max(0,counts.followed-1);
    }
    counts.read++;
    updateBadges();
    if(currentTab!=='read') slideOutCard(chatId);
  }

  // Follow → move to Following tab
  function doFollowThread(chatId){
    const t=threads.get(chatId);if(!t||t.followed)return;
    t.followed=true;
    if(!t.markedRead){
      counts[t.category]=Math.max(0,(counts[t.category]||0)-1);
      counts.all=Math.max(0,counts.all-1);
      counts.followed++;
    }
    updateBadges();
    if(currentTab!=='followed') slideOutCard(chatId);
  }

  // Unfollow → back to active
  function doUnfollowThread(chatId){
    const t=threads.get(chatId);if(!t||!t.followed)return;
    t.followed=false;
    if(!t.markedRead){
      counts[t.category]=(counts[t.category]||0)+1;
      counts.all++;
      counts.followed=Math.max(0,counts.followed-1);
    }
    updateBadges();
    renderFeed();
  }

  function slideOutCard(chatId){
    const card=document.querySelector(`.thread-card[data-chat-id="${CSS.escape(chatId)}"]`);
    if(card){
      card.style.transition='opacity 0.3s,transform 0.3s';
      card.style.opacity='0';card.style.transform='translateX(12px)';
      setTimeout(()=>{card.remove();checkEmpty();},300);
    }
  }

  function checkEmpty(){
    setTimeout(()=>{
      const feed=document.getElementById('feed');
      const has=[...feed.children].some(c=>c.id!=='empty-state');
      document.getElementById('empty-state').style.display=has?'none':'flex';
    },350);
  }

  // ─ render
  function getFiltered(){
    return threadOrder.filter(id=>{
      const t=threads.get(id);if(!t)return false;
      if(currentTab==='read') return t.markedRead;
      if(t.markedRead) return false;
      if(currentTab==='followed') return t.followed;
      if(t.followed) return false; // hide followed from other tabs
      if(currentTab==='all') return true;
      return t.category===currentTab;
    });
  }

  function renderFeed(){
    const feed=document.getElementById('feed'),empty=document.getElementById('empty-state');
    [...feed.children].forEach(c=>{if(c!==empty)c.remove();});
    const ids=getFiltered();
    if(!ids.length){empty.style.display='flex';return;}
    empty.style.display='none';
    ids.forEach(id=>{const t=threads.get(id);if(t)feed.appendChild(buildCard(t));});
  }

  function renderMsgRow(msg, isLast, isRead){
    if(msg.fromMe){
      const row=document.createElement('div');
      row.className='thread-msg sent';
      row.innerHTML=`
        <div class="sent-bubble">
          <div class="msg-row-top">
            <span class="msg-sender-sm">You</span>
            <span class="msg-time-sm">${fmtTime(msg.timestamp)}</span>
          </div>
          <div class="msg-body-sm">${esc(msg.body)}</div>
        </div>`;
      return row;
    }
    const row=document.createElement('div');
    row.className='thread-msg';
    row.innerHTML=`
      <div class="tree-line">
        <div class="tree-dot${(!msg.read&&!isRead)?' new':''}"></div>
        ${!isLast?'<div class="tree-vline"></div>':''}
      </div>
      <div class="msg-content">
        <div class="msg-row-top">
          <span class="msg-sender-sm">${esc(msg.sender)}</span>
          <span class="msg-time-sm">${fmtTime(msg.timestamp)}</span>
        </div>
        <div class="msg-body-sm">${msg.hasMedia&&!msg.body?'&#128206; [media]':esc(msg.body)}</div>
      </div>`;
    return row;
  }

  function buildCard(thread){
    const isExpanded=expandedChats.has(thread.chatId);
    const newCount=thread.newCount||0;
    const lastMsg=thread.messages[thread.messages.length-1];
    const displayTag=thread.followed?'followed':thread.category;

    const card=document.createElement('div');
    card.className=`thread-card ${thread.category}${thread.followed?' followed':''}${thread.markedRead?' is-read':''}`;
    card.dataset.chatId=thread.chatId;

    // Header
    const hdr=document.createElement('div');
    hdr.className='thread-header';
    hdr.innerHTML=`
      <div class="th-left">
        <span class="msg-tag tag-${displayTag}">${tagLabel(displayTag)}</span>
        <div style="min-width:0">
          <div class="thread-name">${thread.category==='direct'?'&#128172; ':'&#128101; '}${esc(thread.chatName)}</div>
          ${!isExpanded&&lastMsg?`<div class="thread-preview">${lastMsg.fromMe?'You: ':esc(lastMsg.sender)+': '}${esc(lastMsg.body||'[media]')}</div>`:''}
        </div>
        ${newCount>0&&!thread.markedRead?`<span class="new-pill">${newCount} new</span>`:''}
      </div>
      <div class="th-right">
        <span class="msg-count">${thread.messages.length} msg${thread.messages.length!==1?'s':''}</span>
        <label class="action-check" onclick="event.stopPropagation()">
          <input type="checkbox" class="read-check" ${thread.markedRead?'checked':''}/> Mark read
        </label>
        <label class="action-check follow-check" onclick="event.stopPropagation()">
          <input type="checkbox" class="follow-check-input" ${thread.followed?'checked':''}/> Follow
        </label>
        <span class="chevron${isExpanded?' open':''}">&#9654;</span>
      </div>`;

    // Body
    const body=document.createElement('div');
    body.className='thread-body'+(isExpanded?' open':'');

    const msgList=document.createElement('div');
    msgList.className='thread-msgs';
    thread.messages.forEach((msg,i)=>{
      const isLast=i===thread.messages.length-1;
      msgList.appendChild(renderMsgRow(msg,isLast,thread.markedRead));
    });

    const replyArea=document.createElement('div');
    replyArea.className='thread-reply';
    replyArea.innerHTML=`<input class="reply-input" type="text" placeholder="Reply to ${esc(thread.chatName)}..."/><button class="reply-btn">Send &#10148;</button>`;

    body.appendChild(msgList);
    body.appendChild(replyArea);
    card.appendChild(hdr);
    card.appendChild(body);

    // Collapse toggle
    hdr.addEventListener('click',()=>{
      const opening=!body.classList.contains('open');
      body.classList.toggle('open',opening);
      hdr.querySelector('.chevron').classList.toggle('open',opening);
      if(opening) expandedChats.add(thread.chatId);
      else expandedChats.delete(thread.chatId);
      const previewEl=hdr.querySelector('.thread-preview');
      if(opening&&previewEl) previewEl.remove();
      else if(!opening&&lastMsg&&!hdr.querySelector('.thread-preview')){
        const d=document.createElement('div');
        d.className='thread-preview';
        d.textContent=(lastMsg.fromMe?'You: ':(lastMsg.sender+': '))+(lastMsg.body||'[media]');
        hdr.querySelector('.th-left > div').appendChild(d);
      }
    });

    // Mark read
    hdr.querySelector('.read-check').addEventListener('change',async e=>{
      if(e.target.checked){
        await apiMarkRead(thread.chatId);
        doMarkReadThread(thread.chatId);
        if(currentTab==='read') renderFeed();
      } else {
        thread.markedRead=false;
        counts.read=Math.max(0,counts.read-1);
        if(!thread.followed){ counts[thread.category]=(counts[thread.category]||0)+1; counts.all++; }
        else counts.followed++;
        updateBadges(); renderFeed();
      }
    });

    // Follow
    hdr.querySelector('.follow-check-input').addEventListener('change',e=>{
      if(e.target.checked){
        doFollowThread(thread.chatId);
        toast('&#128992; Moved to Following');
      } else {
        doUnfollowThread(thread.chatId);
        toast('Unfollowed — moved back to active');
      }
    });

    // Reply — adds sent bubble immediately
    const inp=replyArea.querySelector('.reply-input'),btn=replyArea.querySelector('.reply-btn');
    async function sendReply(){
      const text=inp.value.trim();if(!text)return;
      btn.disabled=true;btn.textContent='...';
      try{
        const r=await fetch('/api/reply',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chatId:thread.chatId,message:text})});
        if(r.ok){
          inp.value='';
          // Add sent bubble to thread immediately
          const sentMsg={id:'local-'+Date.now(),sender:'You',body:text,
                         timestamp:new Date().toISOString(),read:true,fromMe:true,hasMedia:false};
          thread.messages.push(sentMsg);
          const row=renderMsgRow(sentMsg,true,false);
          msgList.appendChild(row);
          // scroll to bottom of body
          body.scrollTop=body.scrollHeight;
          // update count in header
          const countEl=hdr.querySelector('.msg-count');
          if(countEl) countEl.textContent=`${thread.messages.length} msgs`;
          toast('&#9989; Sent!');
        } else toast('&#10060; Failed');
      }catch(e){toast('&#10060; '+e.message);}
      btn.disabled=false;btn.innerHTML='Send &#10148;';
    }
    inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendReply();}});
    btn.addEventListener('click',sendReply);

    return card;
  }

  // ─ API
  async function apiMarkRead(chatId){
    try{await fetch('/api/mark-read',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chatId})});}catch(e){}
  }
  document.getElementById('clear-btn').addEventListener('click',async()=>{
    const btn=document.getElementById('clear-btn');
    btn.disabled=true;btn.innerHTML='&#9203; Clearing...';
    try{
      const r=await fetch('/api/clear-all',{method:'POST'});
      const d=await r.json();
      if(r.ok)toast(`&#9989; Cleared ${d.cleared}, kept ${d.skipped}`);else toast('&#10060; '+d.error);
    }catch(e){toast('&#10060; '+e.message);}
    btn.disabled=false;btn.innerHTML='&#129529; Clear All';
  });

  function updateBadges(){
    Object.keys(counts).forEach(k=>{const el=document.getElementById(`badge-${k}`);if(el)el.textContent=counts[k];});
  }

  // ─ socket
  socket.on('status',d=>{
    document.getElementById('status-dot').className='status-dot'+(d.connected?' online':'');
    document.getElementById('status-text').textContent=d.message;
    if(d.connected)document.getElementById('qr-modal').classList.remove('show');
  });
  socket.on('qr',url=>{document.getElementById('qr-img').src=url;document.getElementById('qr-modal').classList.add('show');});
  socket.on('stats',d=>{
    document.getElementById('unread-count').textContent=d.groupsUnread;
    document.getElementById('unread-badge').classList.toggle('visible',d.groupsUnread>0);
  });

  socket.on('history',msgs=>{
    [...msgs].reverse().forEach(m=>addMsg(m,false));
    Object.keys(counts).forEach(k=>counts[k]=0);
    threads.forEach(t=>{
      if(t.markedRead){counts.read++;return;}
      if(t.followed){counts.followed++;return;}
      counts[t.category]=(counts[t.category]||0)+1;counts.all++;
    });
    updateBadges();renderFeed();
  });

  socket.on('message',msg=>{
    msg.read=false;msg.followed=false;
    const isNewThread=!threads.has(msg.chatId);
    addMsg(msg,true);
    const t=threads.get(msg.chatId);

    if(isNewThread&&!t.markedRead&&!t.followed){
      counts[msg.category]=(counts[msg.category]||0)+1;counts.all++;updateBadges();
    }
    playNotif();
    if(Notification.permission==='granted')new Notification(`WhatsApp — ${msg.sender}`,{body:msg.body||'[media]'});
    if(t.markedRead)return;

    // rebuild card in current view
    const show=(currentTab==='all'&&!t.followed)||(currentTab===t.category&&!t.followed)||(currentTab==='followed'&&t.followed);
    const existing=document.querySelector(`.thread-card[data-chat-id="${CSS.escape(msg.chatId)}"]`);
    if(existing&&show){
      existing.remove();
      document.getElementById('feed').insertBefore(buildCard(t),document.getElementById('feed').firstChild);
    } else if(!existing&&show){
      document.getElementById('empty-state').style.display='none';
      document.getElementById('feed').insertBefore(buildCard(t),document.getElementById('feed').firstChild);
    }
  });

  if(Notification.permission==='default')Notification.requestPermission();
</script>
</body>
</html>
