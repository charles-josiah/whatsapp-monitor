services:
  whatsapp-monitor:
    build: .
    container_name: whatsapp-monitor
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./wwebjs_auth:/app/.wwebjs_auth
      - ./wwebjs_cache:/app/.wwebjs_cache
      - ./data:/app/data
    environment:
      - PORT=3000
